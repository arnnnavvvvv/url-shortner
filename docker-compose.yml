version: "3.9"

services:

  backend:
    build: .
    ports:
      - "5000:5000"
      - "5555:5555"
      

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/url_shortener
      JWT_SECRET: supersecret
      PORT: 5000
      REDIS_URL: redis://redis:6379

    volumes:
      - .:/app
      - /app/node_modules

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: url_shortener

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    ports:
      - "6379:6379"

volumes:
  postgres_data: